# Release pipeline: on a vX.Y.Z tag, build and push a multi-arch (amd64 + arm64) static sealantd
# image to GHCR. The sandbox image consumes it via `COPY --from` (see docs/runtime/integration.md).
name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # QEMU lets buildx build the arm64 image on an amd64 runner (emulated). For faster releases,
      # swap this single job for a per-arch matrix on native runners + a manifest merge.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  npm:
    runs-on: ubuntu-latest
    # Gate every publish behind a protected environment: add required reviewers + restrict deployment
    # to protected tags in repo Settings -> Environments -> npm-publish. This means a compromised PR,
    # dependency, or fork cannot trigger a publish without human approval.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # OIDC: lets npm Trusted Publishing authenticate with no stored token
    steps:
      - uses: actions/checkout@v5
      # Enable Corepack BEFORE setup-node: setup-node@v5 reads package.json#packageManager
      # (pnpm@11.1.0) and needs pnpm on PATH. Corepack ships with Node, so nothing runs on the
      # deprecated Node 20 action runtime.
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      # --ignore-scripts: never run dependency lifecycle scripts in the publish job. The build below
      # needs none (codegen is committed; build is just tsc).
      - run: pnpm install --frozen-lockfile --ignore-scripts
      # Sync the SDK package versions to the git tag (tag is the single source of truth).
      - run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm --filter "@sealant/runtime-protocol" --filter "@sealant/runtime-client" \
            exec npm version "$VERSION" --no-git-tag-version --allow-same-version
      - run: pnpm -r build
      # Tokenless publish via npm Trusted Publishing: the OIDC id-token (permissions above)
      # authenticates the publish — no stored credential. --provenance attaches a public build
      # attestation (the source repo is public). Configure the matching trusted publisher on
      # npmjs.com for BOTH packages: repo get-sealant/sealantd, workflow release.yml, env npm-publish.
      - run: pnpm -r publish --access public --no-git-checks --provenance
