# Tests on every PR and on pushes to main.
#
# SECURITY: this uses `pull_request` (NOT `pull_request_target`). That means PRs — including from
# forks — run in the PR's own context with a read-only GITHUB_TOKEN and NO access to repo secrets.
# A malicious PR can run code in the ephemeral runner but cannot read secrets, push, or publish.
# Nothing here references a secret, by design.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: read-only, no write, no id-token.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false # don't leave the git token in .git for later steps
      - uses: dtolnay/rust-toolchain@stable # Blacksmith runners don't preinstall Rust like github-hosted
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2 # cache ~/.cargo + target so deps aren't recompiled each run
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # ubuntu-latest is Linux, so this also runs the Linux-only tests (inotify, peer-cred, reaper).
      - run: cargo test --workspace

  node:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # --ignore-scripts: never run dependency lifecycle scripts (untrusted on fork PRs).
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm -r build
      - uses: dtolnay/rust-toolchain@stable # Blacksmith runners don't preinstall Rust
      - run: cargo build -p sealantd # the TypeScript e2e spawns the daemon binary
      - run: pnpm -r test
