# Changesets versioning. On push to main, open/update a "Version Packages" PR that bumps the two
# SDK packages (fixed together) and writes CHANGELOGs.
#
# SECURITY: this ONLY opens a PR — it has no `publish` step and no npm credentials. It runs only on
# direct pushes to this repo's main (forks/PRs do not trigger `push`); the repository guard is extra
# belt. Publishing stays exclusively in release.yml (tag-triggered, environment-gated, OIDC).
name: version

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    if: github.repository == 'get-sealant/sealantd'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # commit the version bump to the changeset-release branch
      pull-requests: write # open/update the Version Packages PR
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          # No `publish:` — this workflow never publishes. Merge the Version PR, then tag to release.
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
